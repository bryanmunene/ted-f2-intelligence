platform_signals:
  hard_lock:
    - id: power_platform_required
      name: Microsoft Power Platform mandatory
      penalty: 24
      severe: true
      terms:
        - mandatory power platform
        - must use power platform
        - microsoft power platform only
        - power platform mandatory
        - delivered on power platform
    - id: sharepoint_required
      name: SharePoint delivery mandated
      penalty: 22
      severe: true
      terms:
        - must use sharepoint
        - sharepoint platform required
        - implemented on sharepoint
        - sharepoint only
        - sharepoint based solution
    - id: named_platform_required
      name: Named platform implementation only
      penalty: 20
      severe: true
      terms:
        - servicenow implementation
        - salesforce implementation
        - sap platform required
        - oracle platform required
        - named platform mandatory
  soft_lock:
    - id: microsoft_environment
      name: Existing Microsoft environment
      penalty: 8
      terms:
        - existing microsoft environment
        - microsoft licenses already available
        - incumbent sharepoint
        - microsoft stack preferred
        - preferred power platform
    - id: incumbent_platform
      name: Incumbent platform referenced
      penalty: 7
      terms:
        - incumbent solution
        - current sharepoint solution
        - current servicenow environment
        - existing salesforce environment
  openness:
    - id: equivalent_solutions
      name: Equivalent solutions accepted
      bonus: 10
      terms:
        - equivalent solutions accepted
        - or equivalent
        - functionally equivalent
        - outcome based specification
        - no mandatory platform
    - id: replacement_openness
      name: Platform replacement appears possible
      bonus: 8
      terms:
        - migration from existing platform
        - replacement of current system
        - bidders may propose alternative platform

qualification_questions:
  default:
    - Is the platform fixed, or are equivalent solutions acceptable?
    - How many end users are expected?
    - What integrations are required?
    - Is hosting included?
    - What is the budget range?
    - Is there openness to replacing Microsoft or SharePoint if lower total cost and stronger fit can be demonstrated?
  missing_deadline:
    - Can the buyer confirm the final submission deadline and clarification window?
  hard_lock:
    - Is the named platform truly mandatory, or can equivalent platforms be proposed?
    - Is the requirement for Microsoft, SharePoint, ServiceNow, Salesforce, SAP, or Oracle driven by policy, integration, or incumbent constraints?
  soft_lock:
    - Are existing licenses a preference only, or a mandatory delivery constraint?
  integration:
    - Which core systems must the solution integrate with?
  timing:
    - Is there any flexibility in the procurement timetable?

